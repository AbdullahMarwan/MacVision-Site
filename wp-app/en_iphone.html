<!-- wp:html -->
<style>
.filter-wrap{margin:0 auto 3rem;text-align:center;padding:0 1rem}
.filter-label{display:block;font-weight:600;font-size:1rem;margin-bottom:0.5rem;color:#333}
.filter-select{width:auto;min-width:0;max-width:280px;padding:0.6rem 2rem 0.6rem 0.8rem;font-size:0.95rem;font-family:inherit;border:2px solid var(--wp--preset--color--accent-6,#333);border-radius:10px;background:#fff;cursor:pointer;box-sizing:border-box}
@media(max-width:480px){.filter-select{max-width:100%;width:100%}}
.filter-select:focus{outline:none;box-shadow:0 0 0 3px rgba(0,0,0,0.1)}
.filter-select optgroup{font-weight:700;font-style:normal;color:#333}
.filter-select option{font-weight:400}
.filter-select option:disabled{color:#999}
#device-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;max-width:1200px;margin:0 auto;padding:0 1rem}
@media(max-width:960px){#device-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:720px){#device-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){#device-grid{grid-template-columns:1fr}}
.device-card{background:#fff;border:1px solid var(--wp--preset--color--accent-6,#ddd);border-radius:12px;padding:24px 16px;text-align:center;display:flex;flex-direction:column;align-items:center;transition:opacity .2s}
.device-card.hidden-device{display:none!important}
.device-card img{width:80px;height:100px;object-fit:contain;margin-bottom:12px}
.device-card h4{font-size:1.05rem;font-weight:700;margin:0 0 10px 0;line-height:1.3}
.price-list{width:100%;font-size:0.9rem}
.price-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f0f0}
.price-row:last-child{border-bottom:none}
.price-val{font-weight:500}
.filter-controls{display:flex;align-items:flex-end;justify-content:center;gap:1rem;flex-wrap:wrap;margin-left:1.5rem;margin-top:1rem}
.filter-search{width:auto;min-width:0;max-width:280px;padding:0.6rem 0.8rem;font-size:0.95rem;font-family:inherit;border:2px solid var(--wp--preset--color--accent-6,#333);border-radius:10px;background:#fff}
.filter-search:focus{outline:none;box-shadow:0 0 0 3px rgba(0,0,0,0.1)}
.device-loading{text-align:center;padding:3rem;color:#999;font-size:1rem}
.device-loading .spinner{display:inline-block;width:24px;height:24px;border:3px solid #f0f0f0;border-top-color:#999;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

<div class="filter-wrap">
<label class="filter-label" for="device-type-filter">Select device type</label>
<div style="display:flex;justify-content:center;flex-wrap:wrap">
<select id="device-type-filter" class="filter-select" onchange="onTypeChange(this.value)">
<option value="all">All devices</option>
</select>
<select id="device-model-filter" class="filter-select" onchange="filterDevices()" style="display:none">
<option value="all">All models</option>
</select>
<div class="filter-controls">
<label class="filter-label" for="device-search">Search device</label>
<input type="text" id="device-search" class="filter-search" placeholder="Type to search..." oninput="filterDevices()"/>
</div>
</div>
</div>

<div id="device-grid">
<div class="device-loading"><span class="spinner"></span> Loading devices...</div>
</div>

<script>
(function(){
var BASE="https://docs.google.com/spreadsheets/d/e/2PACX-1vRdWMks7NYgMgKMpt3jRrGh57Ca-iw8rg1zLHwzbArNGxSpJjBQ8cEXMJRhAipSTdNC4u-77dWKNyDy/pub";
var TABS=[
{url:BASE+"?gid=0&single=true&output=csv",type:"iPhone"},
{url:BASE+"?gid=12930877&single=true&output=csv",type:"iPad"},
{url:BASE+"?gid=1541300668&single=true&output=csv",type:"MacBook"},
{url:BASE+"?gid=120611455&single=true&output=csv",type:"iMac"}
];
var LANG="en";
var typeModels={};var allDevices=[];

function parseCSV(text){
var rows=[];var row=[];var cell="";var inQuote=false;
for(var i=0;i<text.length;i++){
var c=text[i];
if(inQuote){
if(c==='"'){
if(i+1<text.length){if(text[i+1]==='"'){cell+='"';i++;continue}}
inQuote=false
}
else{cell+=c}
}else{
if(c==='"'){inQuote=true}
else if(c===','){row.push(cell);cell=""}
else if(c==='\n'||c==='\r'){
if(c==='\r'){if(i+1<text.length){if(text[i+1]==='\n'){i++}}}
row.push(cell);cell="";rows.push(row);row=[]
}
else{cell+=c}
}
}
if(cell||row.length){row.push(cell);rows.push(row)}
return rows;
}

function parseTab(csv,deviceType){
var rows=parseCSV(csv);if(rows.length<2)return[];
var headers=rows[0];var devices=[];
for(var i=1;i<rows.length;i++){
var r=rows[i];if(r.length<2)continue;
var name=r[0].trim();var cat=r[1].trim();var img=(r[2]||"").trim();
if(!name)continue;
var services=[];
for(var j=3;j<headers.length;j++){
var val=parseInt(r[j])||0;
if(val){services.push({key:headers[j].trim(),price:val})}
}
devices.push({name:name,category:cat,image:img,type:deviceType,services:services});
}
return devices;
}

function buildDropdown(){
var sel=document.getElementById("device-type-filter");
var html='<option value="all">All devices</option>';
var types=Object.keys(typeModels);
for(var i=0;i<types.length;i++){
html+='<option value="'+types[i]+'">'+types[i]+'</option>';
}
sel.innerHTML=html;
}

function onTypeChange(type){
var modelSel=document.getElementById("device-model-filter");
if(type==="all"){
modelSel.style.display="none";
}else{
var models=typeModels[type]||{};
var html='<option value="all">All models</option>';
var keys=Object.keys(models);
for(var i=0;i<keys.length;i++){
html+='<option value="'+keys[i]+'">'+keys[i].replace(/-/g," ").replace(/\b\w/g,function(l){return l.toUpperCase()})+'</option>';
}
modelSel.innerHTML=html;
modelSel.style.display="inline-block";
}
filterDevices();
}

window.filterDevices=function(){
var typeVal=document.getElementById("device-type-filter").value;
var modelEl=document.getElementById("device-model-filter");
var modelVal=modelEl.style.display!=="none"?modelEl.value:"all";
var s=(document.getElementById("device-search")||{}).value||"";
s=s.toLowerCase();
document.querySelectorAll(".device-card").forEach(function(el){
var n=el.querySelector("h4").textContent.toLowerCase();
var dType=el.getAttribute("data-type");
var dCat=el.getAttribute("data-category");
var typeMatch=(typeVal==="all")||(dType===typeVal);
var modelMatch=(modelVal==="all")||(dCat===modelVal);
var searchMatch=(!s)||(n.indexOf(s)>=0);
var show=typeMatch&&modelMatch&&searchMatch;
el.classList.toggle("hidden-device",!show);
});
};

function renderAll(){
var grid=document.getElementById("device-grid");
var html="";
for(var i=0;i<allDevices.length;i++){
var d=allDevices[i];
var img=d.image||"https://placehold.co/80x120/f0f0f0/999?text=iPhone";
html+='<div class="device-card" data-category="'+d.category+'" data-type="'+d.type+'">';
html+='<img src="'+img+'" alt="'+d.name+'" width="80" height="100"/>';
html+='<h4>'+d.name+'</h4>';
html+='<div class="price-list">';
for(var j=0;j<d.services.length;j++){
var svc=d.services[j];
var label=svc.key;
html+='<div class="price-row"><span>'+label+'</span><span class="price-val">'+svc.price+' kr.</span></div>';
}
html+='</div></div>';
}
grid.innerHTML=html;
}

var pending=TABS.length;
var loaded=0;
for(var t=0;t<TABS.length;t++){
(function(tab){
fetch(tab.url).then(function(r){
if(!r.ok)throw new Error(r.status);
return r.text();
}).then(function(csv){
var devs=parseTab(csv,tab.type);
for(var i=0;i<devs.length;i++){
allDevices.push(devs[i]);
if(!typeModels[tab.type])typeModels[tab.type]={};
typeModels[tab.type][devs[i].category]=true;
}
loaded++;if(loaded===pending){buildDropdown();renderAll();}
}).catch(function(){
loaded++;if(loaded===pending){buildDropdown();renderAll();}
});
})(TABS[t]);
}
})();
</script>
<!-- /wp:html -->
