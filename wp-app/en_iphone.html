<!-- wp:html -->
<style>
.filter-wrap{margin:0 auto 3rem;text-align:center;padding:0 1rem}
.filter-label{display:block;font-weight:600;font-size:1rem;margin-bottom:0.5rem;color:#333}
.filter-select{width:auto;min-width:0;max-width:280px;padding:0.6rem 2rem 0.6rem 0.8rem;font-size:0.95rem;font-family:inherit;border:2px solid var(--wp--preset--color--accent-6,#333);border-radius:10px;background:#fff;cursor:pointer;box-sizing:border-box}
@media(max-width:480px){.filter-select{max-width:100%;width:100%}}
.filter-select:focus{outline:none;box-shadow:0 0 0 3px rgba(0,0,0,0.1)}
.filter-select optgroup{font-weight:700;font-style:normal;color:#333}
.filter-select option{font-weight:400}
.filter-select option:disabled{color:#999}
#iphone-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;max-width:1200px;margin:0 auto;padding:0 1rem}
@media(max-width:960px){#iphone-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:720px){#iphone-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){#iphone-grid{grid-template-columns:1fr}}
.device-card{background:#fff;border:1px solid var(--wp--preset--color--accent-6,#ddd);border-radius:12px;padding:24px 16px;text-align:center;display:flex;flex-direction:column;align-items:center;transition:opacity .2s}
.device-card.hidden-device{display:none!important}
.device-card img{width:80px;height:100px;object-fit:contain;margin-bottom:12px}
.device-card h4{font-size:1.05rem;font-weight:700;margin:0 0 10px 0;line-height:1.3}
.price-list{width:100%;font-size:0.9rem}
.price-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f0f0}
.price-row:last-child{border-bottom:none}
.price-val{font-weight:500}
.filter-controls{display:flex;align-items:flex-end;justify-content:center;gap:1rem;flex-wrap:wrap;margin-left:1.5rem;margin-top:1rem}
.filter-search{width:auto;min-width:0;max-width:280px;padding:0.6rem 0.8rem;font-size:0.95rem;font-family:inherit;border:2px solid var(--wp--preset--color--accent-6,#333);border-radius:10px;background:#fff}
.filter-search:focus{outline:none;box-shadow:0 0 0 3px rgba(0,0,0,0.1)}
.device-loading{text-align:center;padding:3rem;color:#999;font-size:1rem}
.device-loading .spinner{display:inline-block;width:24px;height:24px;border:3px solid #f0f0f0;border-top-color:#999;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

<div class="filter-wrap">
<label class="filter-label" for="device-filter">Select category</label>
<div style="display:flex;justify-content:center;flex-wrap:wrap">
<select id="device-filter" class="filter-select" onchange="filterDevices(this.value)">
<option value="all">All devices</option>
<optgroup label="iPhone">
<option value="iphone-17">iPhone 17</option>
<option value="iphone-16">iPhone 16</option>
<option value="iphone-15">iPhone 15</option>
<option value="iphone-14">iPhone 14</option>
<option value="iphone-13">iPhone 13</option>
<option value="iphone-12">iPhone 12</option>
<option value="iphone-11">iPhone 11</option>
<option value="iphone-x">iPhone X</option>
<option value="iphone-8">iPhone 8 / SE</option>
<option value="iphone-7">iPhone 7</option>
<option value="iphone-6">iPhone 6</option>
<option value="iphone-5">iPhone 5 / SE 1</option>
</optgroup>
<optgroup label="iPad"><option value="" disabled>Coming soon</option></optgroup>
<optgroup label="MacBook"><option value="" disabled>Coming soon</option></optgroup>
<optgroup label="iMac"><option value="" disabled>Coming soon</option></optgroup>
<optgroup label="PC / Laptop"><option value="" disabled>Coming soon</option></optgroup>
<optgroup label="Accessories"><option value="" disabled>Coming soon</option></optgroup>
</select>
<div class="filter-controls">
<label class="filter-label" for="device-search">Search device</label>
<input type="text" id="device-search" class="filter-search" placeholder="Type to search..." oninput="filterDevices(document.getElementById('device-filter').value)"/>
</div>
</div>
</div>

<div id="iphone-grid">
<div class="device-loading"><span class="spinner"></span> Loading devices...</div>
</div>

<script>
(function(){
var CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRdWMks7NYgMgKMpt3jRrGh57Ca-iw8rg1zLHwzbArNGxSpJjBQ8cEXMJRhAipSTdNC4u-77dWKNyDy/pub?gid=0&single=true&output=csv";
var LANG="en";

function parseCSV(text){
var rows=[];var row=[];var cell="";var inQuote=false;
for(var i=0;i<text.length;i++){
var c=text[i];
if(inQuote){
if(c==='"'){
if(i+1<text.length){if(text[i+1]==='"'){cell+='"';i++;continue}}
inQuote=false
}
else{cell+=c}
}else{
if(c==='"'){inQuote=true}
else if(c===','){row.push(cell);cell=""}
else if(c==='\n'||c==='\r'){
if(c==='\r'){if(i+1<text.length){if(text[i+1]==='\n'){i++}}}
row.push(cell);cell="";rows.push(row);row=[]
}
else{cell+=c}
}
}
if(cell||row.length){row.push(cell);rows.push(row)}
return rows;
}

function renderGrid(headers,rows){
var grid=document.getElementById("iphone-grid");
var html="";
for(var i=0;i<rows.length;i++){
var r=rows[i];if(r.length<2)continue;
var name=r[0].trim();var cat=r[1].trim();var img=(r[2]||"").trim();
if(!name)continue;
html+='<div class="device-card" data-category="'+cat+'">';
var imgSrc=img||"https://placehold.co/80x120/f0f0f0/999?text=iPhone";
html+='<img src="'+imgSrc+'" alt="'+name+'" width="80" height="100"/>';
html+='<h4>'+name+'</h4>';
html+='<div class="price-list">';
for(var j=3;j<headers.length;j++){
var val=parseInt(r[j])||0;
if(!val)continue;
var label=headers[j].trim();
html+='<div class="price-row"><span>'+label+'</span><span class="price-val">'+val+' kr.</span></div>';
}
html+='</div></div>';
}
grid.innerHTML=html;
}

window.filterDevices=function(c){
var s=(document.getElementById("device-search")||{}).value||"";
s=s.toLowerCase();
document.querySelectorAll(".device-card").forEach(function(el){
var n=el.querySelector("h4").textContent.toLowerCase();
var catMatch=(c==="all")||(el.getAttribute("data-category")===c);
var searchMatch=(!s)||(n.indexOf(s)>=0);
el.classList.toggle("hidden-device",!(catMatch?searchMatch:false))
});
};

fetch(CSV_URL).then(function(r){return r.text()}).then(function(csv){
var rows=parseCSV(csv);
var headers=rows[0];
renderGrid(headers,rows.slice(1));
}).catch(function(e){
document.getElementById("iphone-grid").innerHTML='<div class="device-loading">Could not load devices. Please try again later.</div>';
});
})();
</script>
<!-- /wp:html -->
